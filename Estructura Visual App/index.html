<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectFlow - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">
        <h1>ProjectFlow</h1>
        <div class="user-info">Bienvenido, usuario</div>
    </header>

    <main class="container">

        <aside class="sidebar">
            <nav>
                <ul>
                    <li class="active">Dashboard</li>
                    <li>Proyectos</li>
                    <li>Tareas</li>
                    <li>Equipo</li>
                    <li>Ajustes</li>
                </ul>
            </nav>
        </aside>

        <section class="content">
            <h2>Tareas Pendientes</h2>

            <div class="task-list">

                <form id="task-form" style="margin-bottom: 1.5rem;">
                    <input type="text" id="task-input" placeholder="Nueva tarea..." required>

                    <select id="task-priority">
                        <option value="high">Alta</option>
                        <option value="medium">Media</option>
                        <option value="low">Baja</option>
                    </select>

                    <input type="text" id="task-category" placeholder="Categoría" required>

                    <button type="submit">Agregar</button>
                </form>

                <input type="text" id="search-input" placeholder="Buscar tarea..." style="margin-bottom: 1.5rem;">

                <div class="task-list" id="task-list"></div>

            </div>
        </section>

    </main>
<script src="app.js"></script>
</body>

</html>
