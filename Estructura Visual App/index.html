<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectFlow - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <h1>ProjectFlow</h1>
        <div class="user-info">Bienvenido, usuario</div>
    </header>

    <main class="container">

        <aside class="sidebar">
            <nav>
                <ul>
                    <li class="active">Dashboard</li>
                    <li>Proyectos</li>
                    <li>Tareas</li>
                    <li>Equipo</li>
                    <li>Ajustes</li>
                </ul>
            </nav>
        </aside>

        <section class="content">
            <h2>Tareas Pendientes</h2>

            <div class="task-list">

                <div class="task-card high">
                    <div class="task-info">
                        <h3>Diseñar página principal</h3>
                        <span class="category">UI/UX</span>
                    </div>
                    <span class="badge">Alta</span>
                </div>

                <div class="task-card medium">
                    <div class="task-info">
                        <h3>Configurar base de datos</h3>
                        <span class="category">Backend</span>
                    </div>
                    <span class="badge">Media</span>
                </div>

                <div class="task-card low">
                    <div class="task-info">
                        <h3>Revisar documentación</h3>
                        <span class="category">Research</span>
                    </div>
                    <span class="badge">Baja</span>
                </div>

            </div>
        </section>

    </main>

</body>
</html>
