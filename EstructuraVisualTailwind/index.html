<!DOCTYPE html>
<html lang="es" class="dark">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<link href="style.css" rel="stylesheet">

</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 transition-colors duration-300">

<header class="flex justify-between items-center h-16 px-4 sm:px-8 bg-white dark:bg-gray-800 shadow">

<div class="flex items-center gap-3">
  <button id="mobile-menu-toggle" class="md:hidden inline-flex items-center justify-center p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition">
    <span class="sr-only">Abrir menú</span>
    <svg class="w-5 h-5 text-gray-700 dark:text-gray-200" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
  </button>

  <h1 class="text-xl font-bold text-indigo-600">TaskFlow</h1>
</div>

<div class="flex items-center gap-4">

<span class="hidden sm:inline">Bienvenido</span>

<button id="theme-toggle"
class="px-3 py-1 rounded-lg bg-gray-200 dark:bg-gray-700 hover:scale-105 transition">
🌙☀️
</button>

</div>

</header>

<main class="flex flex-col md:flex-row min-h-screen">

<nav id="mobile-menu" class="md:hidden bg-gray-900 text-white px-4 pb-3 pt-2 space-y-2 hidden">
  <ul class="space-y-2">
    <li id="tab-projects-mobile" class="bg-indigo-600 text-white px-4 py-2 rounded-xl cursor-pointer text-sm font-medium shadow-sm">Proyectos</li>
    <li id="tab-tasks-mobile" class="text-gray-200 px-4 py-2 rounded-xl cursor-pointer text-sm font-medium hover:bg-indigo-500/60 transition">Tareas</li>
    <li class="text-gray-300 px-4 py-2 rounded-xl cursor-pointer text-sm font-medium hover:bg-indigo-500/40 transition">Equipo</li>
    <li class="text-gray-300 px-4 py-2 rounded-xl cursor-pointer text-sm font-medium hover:bg-indigo-500/40 transition">Ajustes</li>
  </ul>
</nav>

<aside class="w-64 bg-gray-900 text-white p-6 hidden md:block">

      <ul class="space-y-2">

      <li id="tab-projects" class="bg-indigo-600 text-white px-4 py-2 rounded-xl cursor-pointer text-sm font-medium shadow-sm">Proyectos</li>
      <li id="tab-tasks" class="text-gray-200 px-4 py-2 rounded-xl cursor-pointer text-sm font-medium hover:bg-indigo-500/60 transition">Tareas</li>
      <li class="text-gray-300 px-4 py-2 rounded-xl cursor-pointer text-sm font-medium hover:bg-indigo-500/40 transition">Equipo</li>
      <li class="text-gray-300 px-4 py-2 rounded-xl cursor-pointer text-sm font-medium hover:bg-indigo-500/40 transition">Ajustes</li>

      </ul>

</aside>


  <section class="flex-1 p-4 sm:p-6 lg:p-8">

  <div id="projects-section" class="bg-white dark:bg-gray-800 border border-gray-200/80 dark:border-gray-700/80 rounded-2xl shadow-sm p-6 sm:p-8 space-y-6">
    <h2 class="text-2xl sm:text-3xl font-semibold mb-2 text-gray-900 dark:text-gray-100">Proyectos</h2>
    <p class="text-sm text-gray-600 dark:text-gray-300 mb-4">Crea y gestiona los proyectos a los que luego asignarás tus tareas.</p>

    <form id="project-form" class="flex flex-col gap-4 mb-8 max-w-2xl">
      <input
        id="project-name"
        type="text"
        placeholder="Nombre del proyecto"
        required
        class="border rounded-lg w-full text-sm h-9 px-3 py-1.5
        bg-white text-gray-800 placeholder-gray-400
        dark:bg-gray-700 dark:text-white dark:placeholder-gray-300
        hover:border-indigo-400
        focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500
        outline-none transition duration-200"
      />

      <textarea
        id="project-description"
        placeholder="Descripción del proyecto"
        rows="2"
        class="border rounded-lg w-full text-sm px-3 py-2 resize-none
        bg-white text-gray-800 placeholder-gray-400
        dark:bg-gray-700 dark:text-white dark:placeholder-gray-300
        hover:border-indigo-400
        focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500
        outline-none transition duration-200"
      ></textarea>

      <button
        class="self-start bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 hover:scale-105 transition col-span-full sm:w-max">
        Crear proyecto
      </button>
    </form>

    <div id="project-list" class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-4"></div>
  </div>

  <div id="tasks-section" class="hidden bg-white dark:bg-gray-800 border border-gray-200/80 dark:border-gray-700/80 rounded-2xl shadow-sm p-6 sm:p-8 space-y-6 mt-6">
  <h2 class="text-2xl sm:text-3xl font-semibold mb-2 text-gray-900 dark:text-gray-100">Tareas</h2>
  <p id="current-project-label" class="text-sm text-gray-500 dark:text-gray-400 mb-4">Selecciona un proyecto para empezar a crear tareas.</p>

  <form id="task-form" class="flex flex-wrap gap-3 mb-6">

<input
id="task-input"
type="text"
placeholder="Nueva tarea..."
required
class="border p-2 rounded-lg flex-1
bg-white text-gray-800 placeholder-gray-400
dark:bg-gray-700 dark:text-white dark:placeholder-gray-300
hover:border-indigo-400
focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500
outline-none transition duration-200"
/>

<select
id="task-priority"
class="border p-2 rounded-lg
bg-white text-gray-800
dark:bg-gray-700 dark:text-white
hover:border-indigo-400
focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500
outline-none transition duration-200">

<option value="high">Alta</option>
<option value="medium">Media</option>
<option value="low">Baja</option>

</select>

<input
id="task-category"
type="text"
placeholder="Categoría"
required
class="border p-2 rounded-lg
bg-white text-gray-800 placeholder-gray-400
dark:bg-gray-700 dark:text-white dark:placeholder-gray-300
hover:border-indigo-400
focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500
outline-none transition duration-200"
/>

<button
class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 hover:scale-105 transition">

Agregar

</button>

</form>


  <div class="flex flex-wrap items-center gap-3 mb-6">
    <label class="text-sm text-gray-600 dark:text-gray-300" for="project-select">
      Proyecto actual:
    </label>
    <select
      id="project-select"
      class="border p-2 rounded-lg
      bg-white text-gray-800
      dark:bg-gray-700 dark:text-white
      hover:border-indigo-400
      focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500
      outline-none transition duration-200">
      <option value="">Sin proyecto</option>
    </select>
  </div>

  <input
  id="search-input"
  type="text"
  placeholder="Buscar tarea..."
  class="border p-2 rounded-lg w-full mb-6
  bg-white text-gray-800 placeholder-gray-400
  dark:bg-gray-700 dark:text-white dark:placeholder-gray-300
  hover:border-indigo-400
  focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500
  outline-none transition duration-200"
  />


  <div class="flex flex-wrap justify-between items-center gap-3 mb-6">
  <select
    id="status-filter"
    class="border p-2 rounded-lg
    bg-white text-gray-800
    dark:bg-gray-700 dark:text-white
    hover:border-indigo-400
    focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500
    outline-none transition duration-200">
    <option value="todas">Todas</option>
    <option value="pendiente">Pendientes</option>
    <option value="completado">Completadas</option>
  </select>

  <div class="flex gap-2">
    <button
      id="complete-all"
      class="px-3 py-2 rounded-lg text-xs bg-green-600 text-white hover:bg-green-700 hover:scale-105 transition">
      Marcar todas como completadas
    </button>
    <button
      id="clear-completed"
      class="px-3 py-2 rounded-lg text-xs bg-red-600 text-white hover:bg-red-700 hover:scale-105 transition">
      Borrar tareas completadas
    </button>
  </div>
</div>

  <div id="task-list" class="space-y-4"></div>
  </div>

  </section>

</main>

<script src="app.js"></script>

</body>
</html>
